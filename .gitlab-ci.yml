# GitLab CI/CD Configuration for OpenShift DPF
# End-to-end test pipeline that performs a full deployment cycle.
#
# This pipeline:
# 1. Clones repo from REPO_URL at REPO_REF on remote host
# 2. Generates .env from ci/env.defaults + ci/env.required + ci/env.template
# 3. Runs deployment via SSH
#
# =============================================================================
# Required CI/CD Variables (set in GitLab UI: Settings > CI/CD > Variables)
# =============================================================================
#
# Repository:
#   - REPO_URL                - Git repository URL to clone
#   - REPO_REF                - Git ref to checkout (branch, tag, or commit)
#
# Remote Host:
#   - REMOTE_HOST
#   - REMOTE_USER
#   - REMOTE_PASSWORD (Masked)
#   - REMOTE_WORK_DIR
#
# Required Environment (no defaults - must be set):
#   - CLUSTER_NAME, BASE_DOMAIN
#   - API_VIP, INGRESS_VIP, DPU_HOST_CIDR, HBN_OVN_NETWORK
#   - BFB_URL, TARGETCLUSTER_API_SERVER_HOST
#   - HBN_HOSTNAME_NODE1, HBN_HOSTNAME_NODE2, MAC_PREFIX
#   - WORKER_1_NAME, WORKER_1_BMC_IP, WORKER_1_BMC_USER, WORKER_1_BMC_PASSWORD, WORKER_1_BOOT_MAC
#   - WORKER_2_NAME, WORKER_2_BMC_IP, WORKER_2_BMC_USER, WORKER_2_BMC_PASSWORD, WORKER_2_BOOT_MAC
#
# Pull Secrets (paste JSON content, mark as Masked):
#   - OPENSHIFT_PULL_SECRET_CONTENT
#   - DPF_PULL_SECRET_CONTENT
#
# Optional: Override any defaults from ci/env.defaults
# =============================================================================

stages:
  - e2e

variables:
  REPO_URL: "https://github.com/killianmuldoon/openshift--dpf"
  REPO_REF: "pr-verify-dpf-deployment"
  OPENSHIFT_PULL_SECRET: openshift_pull.json
  DPF_PULL_SECRET: pull-secret.txt
  RUN_TRAFFIC_FLOW_TESTS: "true"

dpf-on-ocp-e2e:
  stage: e2e
  tags:
    - type/shell
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  script:
    - echo "Starting e2e test - $(date)"

    # Clone repo on remote host
    - echo "Cloning repo to ${REMOTE_HOST}:${REMOTE_WORK_DIR}..."
    - |
      sshpass -p "${REMOTE_PASSWORD}" ssh -o StrictHostKeyChecking=no ${REMOTE_USER}@${REMOTE_HOST} "
        set -e
        rm -rf ${REMOTE_WORK_DIR}
        git clone ${REPO_URL} ${REMOTE_WORK_DIR}
        cd ${REMOTE_WORK_DIR}
        git checkout ${REPO_REF}
        echo 'Checked out:' \$(git rev-parse HEAD)
      "

    # Copy ci/ directory from current repo to remote host
    - echo "Copying ci/ directory to remote host..."
    - sshpass -p "${REMOTE_PASSWORD}" scp -r -o StrictHostKeyChecking=no ci/ ${REMOTE_USER}@${REMOTE_HOST}:${REMOTE_WORK_DIR}/

    # Generate .env locally and copy to remote host
    - echo "Generating .env locally..."
    - |
      set -e
      # Source defaults (exports them as env vars for envsubst)
      set -a
      source ci/env.defaults
      set +a
      # Validate required variables
      source ci/env.required
      # Generate .env file
      envsubst < ci/env.template > /tmp/generated.env
      echo "Generated .env contents:"
      cat /tmp/generated.env
    - echo "Copying .env to remote host..."
    - sshpass -p "${REMOTE_PASSWORD}" scp -o StrictHostKeyChecking=no /tmp/generated.env ${REMOTE_USER}@${REMOTE_HOST}:${REMOTE_WORK_DIR}/.env
    - rm -f /tmp/generated.env

    # Copy pull secrets to remote host
    - echo "Copying pull secrets..."
    - printf '%s' "${OPENSHIFT_PULL_SECRET_CONTENT}" > /tmp/${OPENSHIFT_PULL_SECRET}
    - printf '%s' "${DPF_PULL_SECRET_CONTENT}" > /tmp/${DPF_PULL_SECRET}
    - sshpass -p "${REMOTE_PASSWORD}" scp -o StrictHostKeyChecking=no /tmp/${OPENSHIFT_PULL_SECRET} ${REMOTE_USER}@${REMOTE_HOST}:${REMOTE_WORK_DIR}/
    - sshpass -p "${REMOTE_PASSWORD}" scp -o StrictHostKeyChecking=no /tmp/${DPF_PULL_SECRET} ${REMOTE_USER}@${REMOTE_HOST}:${REMOTE_WORK_DIR}/
    - rm -f /tmp/${OPENSHIFT_PULL_SECRET} /tmp/${DPF_PULL_SECRET}

    # Run deployment
    - echo "Running deployment on remote host..."
    - |
      sshpass -p "${REMOTE_PASSWORD}" ssh -o StrictHostKeyChecking=no ${REMOTE_USER}@${REMOTE_HOST} "
        set -e
        cd ${REMOTE_WORK_DIR}
        echo 'Working directory:' \$(pwd)
        sudo make clean-all || true
        sudo make delete-cluster || true
        sudo make all
      "

    # Run traffic flow tests if enabled
    - |
      if [ "${RUN_TRAFFIC_FLOW_TESTS}" = "true" ]; then
        echo "Running traffic flow tests..."
        sshpass -p "${REMOTE_PASSWORD}" ssh -o StrictHostKeyChecking=no ${REMOTE_USER}@${REMOTE_HOST} "
          set -e
          cd ${REMOTE_WORK_DIR}
          sudo make run-traffic-flow-tests
        "
      else
        echo "Traffic flow tests skipped"
      fi

    - echo "E2E test completed successfully - $(date)"
  timeout: 4h
