# RBAC for DPF controller components on OpenShift
#
# 1) Provisioning controller needs pods/finalizers update permission
#    Upstream fix pending - this is a workaround until the controller chart includes it
# 2) DPUService controller needs privileged SCC to manage DPU service pods
# 3) StaticClusterManager controller needs privileged SCC
# 4) NodeSRIOVDevicePlugin controller needs nodes/finalizers and configmaps/finalizers
#    Upstream fix pending - this is a workaround until the controller chart includes it

---

# DPUService controller: privileged SCC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dpuservice-scc-privileged
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
- kind: ServiceAccount
  name: dpuservice-controller-manager
  namespace: dpf-operator-system
---
# StaticClusterManager controller: privileged SCC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: static-cm-scc-privileged
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
- kind: ServiceAccount
  name: static-cm-controller-manager
  namespace: dpf-operator-system
---
